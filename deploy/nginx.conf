# /etc/nginx/sites-available/statsbudget

server {
    listen 80;
    listen [::]:80;
    server_name statsbudget.dk www.statsbudget.dk;
    return 301 https://www.statsbudget.dk$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name statsbudget.dk;
    return 301 https://www.statsbudget.dk$request_uri;

    ssl_certificate     /etc/letsencrypt/live/statsbudget.dk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/statsbudget.dk/privkey.pem;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.statsbudget.dk;

    ssl_certificate     /etc/letsencrypt/live/statsbudget.dk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/statsbudget.dk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Logs
    access_log /var/log/nginx/statsbudget-access.log;
    error_log  /var/log/nginx/statsbudget-error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    client_max_body_size 1m;

    # Static assets — cache aggressively
    location ~* \.(css|js|svg|png|jpg|jpeg|ico|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Rate-limit API to 60 req/min per IP
        limit_req zone=api burst=20 nodelay;
    }

    # SPA fallback
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Rate limit zone (define in nginx.conf http block or here for clarity)
# limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
